<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Previsão do Tempo</title>
</head>
<body>
  <h1>Consultar Clima</h1>
  <input type="text" id="city" placeholder="Digite a cidade">
  <button onclick="buscarClima()">Buscar</button>

  <pre id="resultado"></pre>

  <script>
    async function buscarClima() {
      const cidade = document.getElementById("city").value;
      const apiKey = "5104515b692a20f0186e41d6757103ee";
      const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(cidade)}&appid=${apiKey}&lang=pt_br&units=metric`;

      try {
        const resposta = await fetch(url);
        if (!resposta.ok) throw new Error("Erro ao buscar dados");
        const dados = await resposta.json();
        document.getElementById("resultado").textContent = JSON.stringify(dados, null, 2);
      } catch (erro) {
        document.getElementById("resultado").textContent = "Erro: " + erro.message;
      }
    }
  </script>
</body>
</html>
