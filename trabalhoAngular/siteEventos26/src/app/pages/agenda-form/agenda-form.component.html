<div class="container border p-4 shadow-sm bg-dark rounded">

  <h2 class="mb-5 text-primary text-center">
    <i class="bi bi-calendar-plus me-3"></i>Novo Evento na Agenda
  </h2>

  <form [formGroup]="agendaForm" (ngSubmit)="salvar()">
    
    <div class="mb-4">
      <label class="form-label">Título do Evento</label>
      <input type="text" formControlName="titulo" class="form-control" 
             [class.is-invalid]="agendaForm.get('titulo')?.touched && agendaForm.get('titulo')?.invalid">
      <div class="invalid-feedback">O título deve ter pelo menos 5 caracteres.</div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-4">
        <label class="form-label">Data</label>
        <input type="date" formControlName="data" class="form-control"
               [class.is-invalid]="agendaForm.get('data')?.touched && agendaForm.get('data')?.invalid">
      </div>

      <div class="col-md-6 mb-4">
        <label class="form-label">Categoria</label>
        <select formControlName="categoriaId" class="form-select"
                [class.is-invalid]="agendaForm.get('categoriaId')?.touched && agendaForm.get('categoriaId')?.invalid">
          <option value="">Selecione...</option>
          @for (cat of categorias; track cat.id) {
            <option [value]="cat.id">{{ cat.nome }}</option>
          }
        </select>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">Localização</label>
      <div class="input-group">
        <input type="text" formControlName="local" class="form-control"
               [class.is-invalid]="agendaForm.get('local')?.touched && agendaForm.get('local')?.invalid">
        <button class="btn btn-outline-primary" type="button" (click)="buscarLocalizacao()" [disabled]="carregandoLocalizacao">
          <span *ngIf="!carregandoLocalizacao">🗺️ Buscar</span>
          <span *ngIf="carregandoLocalizacao">⏳ Buscando...</span>
        </button>
      </div>
      <small class="text-muted" *ngIf="localizacaoEncontrada" style="color: #28a745 !important;">
        ✓ Localização encontrada! ({{ latitude }}, {{ longitude }})
      </small>
    </div>

    <div class="mb-4">
      <label class="form-label">Descrição Curta</label>
      <textarea formControlName="descricao" class="form-control" rows="3"></textarea>
    </div>

    <div class="mb-4">
      <label class="form-label">Imagem do Evento</label>
      <input type="file" accept="image/*" class="form-control" (change)="onImageSelected($event)">
      <small class="text-muted">Selecione uma imagem JPG, PNG ou GIF</small>
    </div>

    @if (imagePreview) {
      <div class="card mb-3">
        <div class="card-body">
          <h6 class="card-title">Preview da Imagem</h6>
          <img [src]="imagePreview" alt="Preview" class="img-thumbnail" style="max-width: 100%; height: auto; border-radius: 0.375rem;">
        </div>
      </div>
    }

    <div class="mb-4">
      <label class="form-label">Valor do Ingresso</label>
      <input type="number" formControlName="valorIngresso" class="form-control"
             [class.is-invalid]="agendaForm.get('valorIngresso')?.touched && agendaForm.get('valorIngresso')?.invalid">
    </div>

    <div class="mt-4 pt-4 border-top border-secondary">
      <div class="d-flex gap-3 justify-content-end">
        <button type="submit" class="btn btn-primary px-4" [disabled]="agendaForm.invalid">
          <i class="bi bi-calendar-check me-2"></i>Agendar Evento
        </button>
        <button type="button" class="btn btn-secondary px-4" (click)="resetarFormulario()">
          <i class="bi bi-arrow-clockwise me-2"></i>Limpar
        </button>
      </div>
    </div>

  </form>
</div>
