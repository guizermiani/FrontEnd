<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-lg border-0" style="max-width: 500px; width: 100%;">
    <div class="card-body text-center p-5">
      <div class="mb-4">
        <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
      </div>

      <h1 class="card-title mb-3 text-primary">Você saiu!</h1>

      <p class="card-text text-muted mb-4">
        Obrigado por usar nossa plataforma de eventos esportivos.
        Esperamos vê-lo novamente em breve!
      </p>

      <button class="btn btn-primary btn-lg px-4" (click)="voltarParaSite()">
        <i class="bi bi-arrow-left me-2"></i>
        Voltar para o Site
      </button>
    </div>
  </div>
</div>
