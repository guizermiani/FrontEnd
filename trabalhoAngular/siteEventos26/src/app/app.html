<div class="app-container">
  <!-- Sidebar Lateral -->
  <aside class="sidebar" [class.expanded]="sidebarExpanded">
    <!-- Toggle Button -->
    <button class="sidebar-toggle" (click)="toggleSidebar()" title="Menu">
      <i class="bi bi-list"></i>
    </button>

    <!-- User Profile -->
    <div class="sidebar-item active" title="Eventos">
      <i class="bi bi-person-circle"></i>
      <span class="sidebar-label">Eventos</span>
    </div>

    <!-- Settings -->
    <button class="sidebar-item" title="Sair" (click)="sair()">
      <i class="bi bi-box-arrow-right"></i>
      <span class="sidebar-label">Sair</span>
    </button>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Navbar -->
    <div class="navbar-wrapper">
      <app-navbar />
    </div>

    <!-- Page Content -->
    <div class="page-content">
      <router-outlet />
    </div>
  </div>
</div>
